server:
  port: 8082

spring:
  application:
    name: servicio-pedidos

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# Configuración de Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      productos:
        sliding-window-size: 5                     # evalúa las últimas 5 llamadas
        failure-rate-threshold: 50                 # abre el circuito si falla el 50%
        wait-duration-in-open-state: 10s           # tiempo abierto antes de reintentar
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

# Actuator: permite ver el estado del circuit breaker en
# http://localhost:8082/actuator/health y /actuator/circuitbreakers
management:
  endpoints:
    web:
      exposure:
        include: health, circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
